version: 3

meta:
  id: graphtruth-development
  title: "GraphTruth development map"
  effort_unit: "focused-day"

statuses:
  done: { label: "Done", color: "#22c55e" }
  current: { label: "Current", color: "#0ea5e9" }
  ready: { label: "Ready", color: "#f59e0b" }
  planned: { label: "Planned", color: "#9ca3af" }
  conditional: { label: "Conditional", color: "#a78bfa" }
  deferred: { label: "Deferred", color: "#64748b" }

profiles:
  - id: opskarta.exec
    version: 1
    namespace: exec

nodes:
  graphtruth:
    title: "GraphTruth"
    kind: summary
    status: current
    notes: |
      Pre-alpha. Foundation is substantially documented, the synthetic S0-S1
      boundary rehearsal passed, and real private utility remains untested. The
      five-focused-day, two-calendar-week limit belongs to all of Issue #6;
      moving between phases never resets it.

  m0-rehearsal-integration:
    title: "Integrate the synthetic rehearsal evidence"
    kind: phase
    parent: graphtruth
    status: current
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Make the local runner, clean report, limitations, and owner confirmation
      visible through the normal repository process. This is integration work,
      not authorization to ingest private data.

  m0-foundation-docs:
    title: "Establish project foundation and evidence-driven process"
    kind: task
    parent: m0-rehearsal-integration
    status: done
    notes: "README, architecture, roadmap, RFC 0000, design archive, and process exist."

  m0-static-preflight:
    title: "Land the public synthetic preflight contract"
    kind: task
    parent: m0-rehearsal-integration
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/10"

  m0-runtime-rehearsal:
    title: "Pass and record the isolated synthetic runtime rehearsal"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-static-preflight]
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Clean Darwin Seatbelt run, two independent synthetic packs, crash/resume,
      exact redelivery, projection rebuild, purge, and owner confirmation.

  m0-planning-layers:
    title: "Adopt the three planning layers and OpsKarta validation"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-runtime-rehearsal]
    status: current
    notes: |
      Keep stable ideas, the capability roadmap, and the operational work map
      separate while linking them explicitly.

  m0-publish-rehearsal:
    title: "Publish the rehearsal change through the repository workflow"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-runtime-rehearsal]
    status: ready
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      The local main is ahead of origin. Preserve the local change set on a
      short-lived branch, open a focused PR, run the gates, and integrate
      without rewriting the evidence artifacts.

  m0-update-issue:
    title: "Update Issue #6 with the synthetic observed and learned record"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-publish-rehearsal]
    status: planned
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Mark the synthetic runner, privacy fixtures, crash/idempotency, lexical
      rebuild, and report as implemented. Leave private lane, baseline utility,
      correction fork, and private decision pending. Record focused time already
      spent and the remaining Issue #6 budget before more implementation.

  m0-sync-project-state:
    title: "Synchronize repository docs and Obsidian project state"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-update-issue, m0-planning-layers]
    status: planned
    notes: |
      Remove claims that no runtime exists, retain the synthetic-only limitation,
      and point personal project notes at the integrated repository revision.

  g0-rehearsal-integrated:
    title: "Gate: rehearsal evidence integrated"
    kind: milestone
    milestone: true
    parent: m0-rehearsal-integration
    deps: [m0-publish-rehearsal, m0-update-issue, m0-sync-project-state]
    status: planned
    notes: |
      Code and evidence are visible in the shared Git state, the quality gate is
      green, Issue #6 matches reality and accounts for its used time box, and no
      private material was introduced.

  m1-evidence-contract-freeze:
    title: "Freeze the first private evidence contract"
    kind: phase
    parent: graphtruth
    deps: [g0-rehearsal-integrated]
    status: planned
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Select and seal one private 3-5 item decision or incident lineage before
      private-lane implementation is allowed to adapt to its outcomes.

  m1-select-episode:
    title: "Select one real episode and its knowledge boundary"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [g0-rehearsal-integrated]
    status: planned
    notes: |
      Record inclusion, exclusion, lineage, chronology, prior familiarity, and
      why the episode can test useful retrieval or reconstruction.

  m1-private-root:
    title: "Prepare the access-controlled private root"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-select-episode]
    status: planned
    notes: "Keep source bytes, oracle, state, logs, and reports outside Git and synchronized public paths."

  m1-freeze-manifest:
    title: "Freeze source bytes, identity, order, lineage, and exclusions"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-private-root]
    status: planned

  m1-freeze-tasks:
    title: "Freeze at least eight tasks, evidence requirements, oracle, and rubric"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-select-episode]
    status: planned
    notes: "Keep oracle structure and all future answers outside SUT visibility."

  m1-freeze-baseline:
    title: "Freeze Markdown plus rg baseline and first-exposure roles"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-freeze-tasks]
    status: planned
    notes: "Use equal source visibility and count GraphTruth-only annotation as capture tax."

  m1-freeze-decision:
    title: "Freeze budgets, severe errors, denominator, and keep/shrink/stop threshold"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-freeze-baseline]
    status: planned

  m1-data-handling:
    title: "Approve run-specific handling, retention, purge, and incident rules"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-private-root]
    status: planned

  m1-synthetic-twin:
    title: "Create a publication-safe synthetic twin"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-freeze-manifest, m1-freeze-tasks]
    status: planned
    notes: "Reproduce the failure shape without private wording, values, identities, or re-identifying structure."

  m1-seal-evidence-contract:
    title: "Seal the private inputs and decision contract"
    kind: task
    parent: m1-evidence-contract-freeze
    deps:
      - m1-freeze-manifest
      - m1-freeze-tasks
      - m1-freeze-baseline
      - m1-freeze-decision
      - m1-data-handling
      - m1-synthetic-twin
    status: planned
    notes: |
      Any later source, task, oracle, baseline, threshold, order, or handling
      change creates a new evidence-contract identity. Exact code, configuration,
      and rehearsal evidence are bound later in the final run card.

  g1-evidence-contract-frozen:
    title: "Gate: private evidence contract frozen"
    kind: milestone
    milestone: true
    parent: m1-evidence-contract-freeze
    deps: [m1-seal-evidence-contract]
    status: planned
    notes: |
      Three to five sources and the complete task denominator are sealed; future
      material and oracle are withheld; baseline, capture tax, decision gates,
      roles, authorization, retention, and the safe twin are reviewable. The
      exact executable identity is deliberately not frozen yet.

  m2-private-lane:
    title: "Implement the minimal private chronological lane"
    kind: phase
    parent: graphtruth
    deps: [g1-evidence-contract-frozen]
    status: planned
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Extend only Zone 3. Keep the public synthetic validator unchanged and do
      not promote experimental private formats into spec, schemas, or RFCs.

  m2-private-policy:
    title: "Add a separate strict private-run policy and lifecycle"
    kind: task
    parent: m2-private-lane
    deps: [g1-evidence-contract-frozen]
    status: planned
    notes: "Support planned, frozen, running, completed, aborted, and invalid states explicitly."

  m2-step-runner:
    title: "Add a stepwise reveal command with persistent state outside the repository"
    kind: task
    parent: m2-private-lane
    deps: [m2-private-policy]
    status: planned
    notes: "Pause before every next reveal; do not generate a private-derived twin or delete evidence prematurely."

  m2-candidate-intake:
    title: "Accept reviewable candidates from ordinary immutable Markdown"
    kind: task
    parent: m2-private-lane
    deps: [m2-step-runner]
    status: planned
    notes: "Use manual or deterministic evidence-aligned input and count its cost. No LLM or embeddings."

  m2-query-measurement:
    title: "Record dossier queries, exact evidence, outcomes, time, and capture tax"
    kind: task
    parent: m2-private-lane
    deps: [m2-candidate-intake]
    status: planned

  m2-private-recovery:
    title: "Exercise private crash/resume, rebuild, termination, and purge"
    kind: task
    parent: m2-private-lane
    deps: [m2-step-runner]
    status: planned

  m2-private-tests:
    title: "Add synthetic private-lane boundary and failure fixtures"
    kind: task
    parent: m2-private-lane
    deps: [m2-query-measurement, m2-private-recovery]
    status: planned

  m2-repeat-rehearsal:
    title: "Repeat the synthetic rehearsal for the changed runtime identity"
    kind: task
    parent: m2-private-lane
    deps: [m2-private-tests]
    status: planned

  m2-owner-confirmation:
    title: "Obtain owner confirmation for the new exact report"
    kind: task
    parent: m2-private-lane
    deps: [m2-repeat-rehearsal]
    status: planned

  m2-seal-final-run:
    title: "Bind the frozen contract to the exact admitted runtime"
    kind: task
    parent: m2-private-lane
    deps: [m2-owner-confirmation]
    status: planned
    notes: |
      Seal the final run card with code revision, runtime identity,
      configuration, policy, budgets, and confirmed rehearsal-report hashes.
      Any later change invalidates the seal and repeats the affected gates.

  g2-runtime-admitted:
    title: "Gate: changed runtime admitted for private bytes"
    kind: milestone
    milestone: true
    parent: m2-private-lane
    deps: [m2-seal-final-run]
    status: planned
    notes: |
      The exact changed runner passes future/oracle/credential/network boundaries,
      crash/resume, rebuild and purge; its report is confirmed by the owner and
      the final run card binds it to the frozen private evidence contract.

  m3-chronological-pilot:
    title: "Run the first private chronological S0-S1 pilot"
    kind: phase
    parent: graphtruth
    deps: [g2-runtime-admitted]
    status: planned
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Use only the remaining registered Issue #6 budget. This phase does not
      start a fresh five-focused-day or two-calendar-week clock.

  m3-execute-frozen-comparison:
    title: "Execute the predeclared first-exposure baseline and frozen SUT lanes"
    kind: task
    parent: m3-chronological-pilot
    deps: [g2-runtime-admitted]
    status: planned
    notes: "Follow the frozen role order; do not repair an active lane after viewing output."

  m3-correction-fork:
    title: "Run the separate interactive correction fork"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-execute-frozen-comparison]
    status: planned
    notes: "Corrections append attributable records and preserve the frozen history."

  m3-score-denominator:
    title: "Score every eligible task, severe error, cost, and omission"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-execute-frozen-comparison, m3-correction-fork]
    status: planned

  m3-learning-record:
    title: "Record expected, observed, learned, failures, and generalized fixtures"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-score-denominator]
    status: planned
    issue: "https://github.com/asukhodko/graphtruth/issues/6"

  m3-decision:
    title: "Decide keep, shrink, or stop for the chronological hypothesis"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-learning-record]
    status: planned
    notes: |
      Keep requires zero severe boundary/history failures and the frozen utility
      threshold. Shrink preserves the safe useful core. Stop remains a valid
      learning result when ordinary files are materially better.

  g3-chronological-decision:
    title: "Gate: private chronological decision recorded"
    kind: milestone
    milestone: true
    parent: m3-chronological-pilot
    deps: [m3-decision]
    status: planned
    notes: |
      Issue #6 becomes learning-complete and closes for keep, shrink, or stop.
      Any order successor or smaller replacement hypothesis gets a new issue.

  m4-order-successor:
    title: "Run the bounded order-robustness successor"
    kind: phase
    parent: graphtruth
    deps: [g3-chronological-decision]
    status: conditional
    notes: |
      Starts only after chronological keep, under a new issue, time box, run
      card, owner, and identity.

  m4-freeze-successor:
    title: "Freeze all n! orders, semantic equivalence, worst-order gate, and retry rules"
    kind: task
    parent: m4-order-successor
    deps: [g3-chronological-decision]
    status: conditional

  m4-run-orders:
    title: "Execute every registered order from clean state"
    kind: task
    parent: m4-order-successor
    deps: [m4-freeze-successor]
    status: conditional

  m4-order-decision:
    title: "Record order-robustness keep, shrink, or stop"
    kind: task
    parent: m4-order-successor
    deps: [m4-run-orders]
    status: conditional

  g4-order-decision:
    title: "Gate: order-robustness decision recorded"
    kind: milestone
    milestone: true
    parent: m4-order-successor
    deps: [m4-order-decision]
    status: conditional

  g4-order-path-disposed:
    title: "Gate: order-successor path disposed"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps:
      - id: g3-chronological-decision
        type: fs
        hard: true
      - id: g4-order-decision
        type: fs
        hard: false
        note: "Required only when the chronological decision is keep."
    status: planned
    notes: |
      After keep, close this gate only through g4-order-decision. After shrink
      or stop, record order robustness as not applicable before closing it.

  m5-next-track:
    title: "Select exactly one next major evidence track"
    kind: phase
    parent: graphtruth
    deps: [g4-order-path-disposed]
    status: planned
    notes: |
      Choose personal-v0 depth, the first public reproducibility corpus, or a
      smaller replacement hypothesis. Do not open parallel major WIP.

  m5-record-choice:
    title: "Record the evidence-based next-track choice"
    kind: task
    parent: m5-next-track
    deps: [g4-order-path-disposed]
    status: planned
    notes: |
      Compare the completed decision record with the remaining Stage 1 exit
      evidence. Select one bounded hypothesis, owner, issue, and decision gate.

  g5-next-track-selected:
    title: "Gate: next major track selected"
    kind: milestone
    milestone: true
    parent: m5-next-track
    deps: [m5-record-choice]
    status: planned

  h-personal-v0:
    title: "Horizon: complete personal v0"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [g5-next-track-selected]
    status: deferred
    notes: "Regular use, correction, second access path, backup/restore, migration, and rebuild without a parallel notebook."

  h-public-corpora:
    title: "Horizon: Python, GitLab, and PostgreSQL public corpus program"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [g5-next-track-selected]
    status: deferred
    notes: |
      One corpus at a time: sequential decision, then 24-order successor before
      advancing. Completion means keep on both steps for all three corpora.

  h-s2-local-model:
    title: "Horizon: local model proposals under a separate S2 gate"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [h-personal-v0]
    status: deferred

  h-emergent-topology:
    title: "Horizon: emergent multi-domain topology experiment"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [h-public-corpora]
    status: deferred
    issue: "https://github.com/asukhodko/graphtruth/issues/8"
    notes: "Eligible only after the complete three-corpus public horizon reaches keep."

  h-protocol-hardening:
    title: "Horizon: earn protocol schemas, conformance, migrations, and an independent reader"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [h-personal-v0]
    status: deferred
    notes: |
      Activation also requires substantial Stage 2 evidence: distinct real
      workflows, measurable correction, and replaceable inference or indexing.

  h-open-source-readiness:
    title: "Horizon: license, governance, installation, and honest public release"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [h-personal-v0, h-protocol-hardening]
    status: deferred

  h-ecosystem:
    title: "Horizon: ecosystem only if independent demand earns it"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [h-open-source-readiness]
    status: deferred

execution:
  nodes:
    m0-foundation-docs:
      progress: 1.0
      actual_start: "2026-07-11"
      actual_finish: "2026-07-13"
      updated_at: "2026-07-14T07:48:00+03:00"
    m0-static-preflight:
      progress: 1.0
      actual_start: "2026-07-12"
      actual_finish: "2026-07-12"
      updated_at: "2026-07-14T07:48:00+03:00"
    m0-runtime-rehearsal:
      progress: 1.0
      actual_start: "2026-07-13"
      actual_finish: "2026-07-14"
      updated_at: "2026-07-14T07:48:00+03:00"
    m0-planning-layers:
      progress: 0.9
      actual_start: "2026-07-14"
      updated_at: "2026-07-14T07:48:00+03:00"
      note: "Authored and validated locally; repository integration remains."

views:
  current-work:
    title: "Current and ready work"
    where:
      status: [current, ready]
    order_by: status
  near-decision-path:
    title: "Near decision path through next-track selection"
    where:
      parent: graphtruth
      status: [current, ready, planned, conditional]
  decision-gates:
    title: "Decision gates"
    where:
      kind: [milestone]
      status: [planned, conditional]
  future-horizons:
    title: "Deferred horizons"
    where:
      status: [deferred]

x:
  exec:
    program:
      nearest_goal: "Complete Issue #6 with a decision from one real private chronological replay."
      success_by_next_sync: "Publish the rehearsal and record consumed and remaining Issue #6 budget."
    defaults:
      status_progress:
        done: 1.0
        current: 0.5
        ready: 0.0
        planned: 0.0
        conditional: 0.0
        deferred: 0.0
      weight_strategy: effort_effective
    blocks:
      integration:
        title: "Rehearsal integration"
        scope_nodes: [m0-rehearsal-integration]
        kind: main
        mgmt:
          health: yellow
          sync_note: "The local rehearsal is green; origin and Issue #6 still describe the older state."
          next_sync_goal: "Publish the evidence and align the public project state."
      pack-freeze:
        title: "Private evidence-contract freeze"
        scope_nodes: [m1-evidence-contract-freeze]
        kind: main
        mgmt:
          health: neutral
          sync_note: "Blocked by integration; no private corpus has been selected."
          next_sync_goal: "Freeze the episode, tasks, baseline, policy, and safe twin before implementation adapts."
      private-lane:
        title: "Private S0-S1 lane"
        scope_nodes: [m2-private-lane]
        kind: main
        mgmt:
          health: neutral
          sync_note: "The current command is a synthetic rehearsal, not a private experiment runner."
          next_sync_goal: "Implement only the capabilities required by the frozen evidence contract, then repeat the rehearsal."
      chronological-pilot:
        title: "Chronological pilot"
        scope_nodes: [m3-chronological-pilot]
        kind: main
        mgmt:
          health: neutral
          sync_note: "Waiting for a newly admitted runtime identity."
          next_sync_goal: "Produce a complete keep, shrink, or stop decision over the frozen denominator."
      order-successor:
        title: "Order successor"
        scope_nodes: [m4-order-successor]
        kind: risk_sidecar
        mgmt:
          health: neutral
          sync_note: "Conditional on chronological keep and a new experiment identity."
    edges:
      - from: integration
        to: pack-freeze
        type: required
      - from: pack-freeze
        to: private-lane
        type: required
      - from: private-lane
        to: chronological-pilot
        type: required
      - from: chronological-pilot
        to: order-successor
        type: context
        label: "only after keep"
    views:
      exec-top:
        direction: LR
        color_mode: mgmt_hybrid
        highlight_current: true
        show_progress: false
        show_gate_date: false
        wrap_title_lines: 2
        caption: "Current evidence path: integrate, freeze, admit, decide."
        blocks: [integration, pack-freeze, private-lane, chronological-pilot]
      exec-active-tracks:
        direction: TB
        color_mode: mgmt_hybrid
        highlight_current: true
        show_progress: false
        show_gate_date: false
        blocks: [integration, pack-freeze, private-lane, chronological-pilot, order-successor]
