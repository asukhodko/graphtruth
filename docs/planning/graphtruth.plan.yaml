version: 3

meta:
  id: graphtruth-development
  title: "GraphTruth development map"
  effort_unit: "repo-active-date"

statuses:
  done: { label: "Done", color: "#22c55e" }
  stopped: { label: "Stopped", color: "#ef4444" }
  current: { label: "Current", color: "#0ea5e9" }
  ready: { label: "Ready", color: "#f59e0b" }
  planned: { label: "Planned", color: "#9ca3af" }
  conditional: { label: "Conditional", color: "#a78bfa" }
  deferred: { label: "Deferred", color: "#64748b" }

profiles:
  - id: opskarta.exec
    version: 1
    namespace: exec

nodes:
  graphtruth:
    title: "GraphTruth"
    kind: summary
    status: current
    notes: |
      Pre-alpha. Foundation, the public synthetic S0-S1 boundary rehearsal,
      repository hardening, the publication-safe G1 twin, and native review
      tooling are retained. Issue #6 stopped before an admissible private
      evidence contract or evaluated private run existed; its fourth and final
      repo-active date is the 2026-07-21 stop synchronization. Terminal local
      states remain outside the repository and later work must not inspect,
      repair, delete, retry, or reuse them. Issue #24 now owns the single major
      WIP: the public `python-annotations-semantics-v1` sequential lane. Its
      five-date budget starts on 2026-07-21, requires an owner decision before
      day five, and has an independent 2026-08-04 hard stop. This public lane
      is now explicitly exploratory: it can harden the experimental procedure
      but cannot serve as the first confirmation of GraphTruth. Confirmation
      requires a fresh corpus and identity with no transfer of disclosed Python
      material. The lane cannot replace the still missing private dogfood
      usefulness evidence.

  m0-rehearsal-integration:
    title: "Integrate the runtime-boundary rehearsal evidence"
    kind: phase
    parent: graphtruth
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      PR #14 published the runner and frozen boundary evidence. PR #15 hardened
      validation, runtime-boundary checks, and the required Linux and Darwin
      gates. Its clean boundary rerun is not a new owner confirmation and does
      not admit the changed runtime identity. Issue #6 and the current project
      notes now match that state. No private data was introduced and no full
      synthetic dress rehearsal is claimed.

  m0-foundation-docs:
    title: "Establish project foundation and evidence-driven process"
    kind: task
    parent: m0-rehearsal-integration
    status: done
    notes: "README, architecture, roadmap, RFC 0000, design archive, and process exist."

  m0-static-preflight:
    title: "Land the public synthetic preflight contract"
    kind: task
    parent: m0-rehearsal-integration
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/10"

  m0-runtime-rehearsal:
    title: "Pass and record the isolated synthetic runtime rehearsal"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-static-preflight]
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Clean Darwin Seatbelt run, two independent synthetic packs, crash/resume,
      exact redelivery, projection rebuild, purge, and owner confirmation. This
      closes the runtime-boundary rehearsal, not the full synthetic dress
      rehearsal or its budget-exhaustion cases.

  m0-planning-layers:
    title: "Adopt the three planning layers and OpsKarta validation"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-runtime-rehearsal]
    status: done
    notes: |
      Stable ideas, the capability roadmap, and the validated operational work
      map were separated and linked in PR #14.

  m0-publish-rehearsal:
    title: "Publish the boundary-rehearsal change through the repository workflow"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-runtime-rehearsal]
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Merged as PR #14 after the repository gates passed. The frozen evidence
      artifacts were integrated without rewriting their recorded observations.

  m0-update-issue:
    title: "Update Issue #6 with the merged boundary-rehearsal evidence"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-publish-rehearsal]
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      At G0 closure, Issue #6 recorded PR #14 and PR #15, the completed boundary
      capabilities, the pending full dress rehearsal and private utility work,
      and the three-of-five distinct Issue #6 repo-active-date accounting. Two
      active dates remained at that checkpoint, with a hard stop on 2026-07-26.

  m0-sync-project-state:
    title: "Synchronize repository docs and Obsidian project state"
    kind: task
    parent: m0-rehearsal-integration
    deps: [m0-update-issue, m0-planning-layers]
    status: done
    notes: |
      Repository docs distinguish the completed runtime-boundary rehearsal from
      the pending full dress rehearsal. The three current Obsidian project notes
      were aligned in kb/main through kb PR #1 and finalized against the closed
      G0 state in follow-up kb PR #2; historical notes remain historical.

  g0-rehearsal-integrated:
    title: "Gate: boundary-rehearsal evidence integrated"
    kind: milestone
    milestone: true
    parent: m0-rehearsal-integration
    deps: [m0-publish-rehearsal, m0-update-issue, m0-sync-project-state]
    status: done
    notes: |
      Code and frozen evidence are visible in shared Git state, both required
      checks are green, Issue #6 matches reality and accounts for its used time
      box, current personal notes are aligned, and no private material was
      introduced. This state-integration gate does not replace the full dress
      rehearsal or admit the current runtime identity.

  g0-foundation-exit:
    title: "Gate: Stage 0 foundation evidence complete"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [g0-rehearsal-integrated]
    status: deferred
    notes: |
      Stage 0 remains open until two independent human reviewers can distinguish
      protocol concepts from implementation choices, every foundational
      invariant has an intended validation or conformance mechanism, and open
      design questions remain explicit. Zone 3 experiments may continue while
      this gate is open, but they do not acquire protocol authority.

  m1-evidence-contract-freeze:
    title: "Freeze the first private evidence contract"
    kind: phase
    parent: graphtruth
    deps: [g0-rehearsal-integrated]
    status: stopped
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Issue #6 stopped before this gate. Public preparation, the synthetic twin,
      native permission-profile qualification, and fail-closed review tooling
      remain retained outputs. A private selection/finalization process did not
      yield an admissible frozen evidence contract or evaluated run. Its
      terminal local states are preserved outside the repository and are not
      inputs to later work. Four Issue #6 repository-active dates were used:
      2026-07-12, 2026-07-13, 2026-07-14, and the 2026-07-21 stop
      synchronization. No G1 receipt may be published from this stopped path.

  m1-select-episode:
    title: "Select one real episode and its knowledge boundary"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [g0-rehearsal-integrated]
    status: stopped
    notes: |
      The private selection path terminated without an accepted corpus identity
      or publication-safe receipt. No private identity, path, count, digest,
      content, participant information, or failure detail is published. Its
      terminal state must not be inspected, repaired, retried, or reused.

  m1-native-codex-preflight:
    title: "Qualify the native Codex review permission profile"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [g0-rehearsal-integrated]
    status: done
    notes: |
      `tooling/codex-sandbox-preflight` passed with synthetic canaries and its
      regenerated exact report is retained under `tooling/rehearsal/`. It pins
      the CLI, model, permission profile, controller, workspace shape, exact
      zero-tool model command, and allowed JSONL trace. It rejects any tool
      event. Model-tool filesystem access is default-deny except for the public
      schema, and model-tool networking is denied. This is not a chroot or a
      sandbox for the Codex client itself. The retained report qualifies the
      public synthetic shape only. Each private attempt still requires a local
      post-seal identity-and-config check; that check contacts no model and does
      not replace the public boundary evidence.

  m1-native-codex-review-tooling:
    title: "Implement the fail-closed native Codex G1 review command"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-native-codex-preflight]
    status: done
    notes: |
      The checked-in command runs the local identity-and-config preflight,
      verifies the sealed pack before constructing the private envelope and
      again after the model call, requires the fixed prompt, control, and result
      schema, and writes only validated structured evidence. It reads the
      complete strict-UTF-8 pack, permits at most 256 artifacts, and rejects a
      fixed-prompt plus canonical-JSON stdin envelope above 1 MiB rather than
      truncating or summarizing it. Each attempt uses one disposable
      `CODEX_HOME` / `HOME` / `TMPDIR` state root for one private model call.
      Tool-capable features are disabled, the allowed JSONL trace is exact, and
      any tool event rejects the attempt. Synthetic tests exercise accept,
      reject, state cleanup, lock mutation, and wrapper boundaries. No private
      review has run.

  m1-private-root:
    title: "Prepare the persistent private roots and staging policy"
    kind: task
    parent: m1-evidence-contract-freeze
    deps:
      - m1-select-episode
      - m1-native-codex-preflight
      - m1-native-codex-review-tooling
    status: deferred
    notes: |
      Keep the persistent private `PACK`, common `ANCHOR`, oracle, logs, and
      reports outside Git and synchronized paths. Freeze the rule that later
      review, attempt-anchor, authorization, and disposable state staging may
      exist only as fresh strict canonical descendants of
      `realpath(os.tmpdir())`. Do not create the attempt copy before the pack is
      sealed. The later attempt keeps both copies controller-only; its ephemeral
      model workspace contains only the exact public result schema, and the
      complete private envelope travels through standard input. The controller
      and Codex client retain their explicitly trusted host access.

  m1-freeze-manifest:
    title: "Freeze source bytes, identity, order, lineage, and exclusions"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-private-root]
    status: deferred

  m1-freeze-tasks:
    title: "Freeze at least eight tasks, evidence requirements, oracle, and rubric"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-freeze-manifest]
    status: deferred
    notes: "Keep oracle structure and all future answers outside SUT visibility."

  m1-freeze-baseline:
    title: "Freeze Markdown plus rg baseline and first-exposure roles"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-freeze-tasks]
    status: deferred
    notes: "Use equal source visibility and count GraphTruth-only annotation as capture tax."

  m1-freeze-decision:
    title: "Freeze budgets, severe errors, denominator, and keep/shrink/stop threshold"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-freeze-baseline]
    status: deferred

  m1-data-handling:
    title: "Approve run-specific handling, retention, purge, and incident rules"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-private-root]
    status: deferred
    notes: |
      The owner must explicitly authorize sending the closed review input to
      OpenAI, define retention and purge rules, and record incidents. Local
      filesystem isolation does not imply that processing stays on the Mac. The
      authorization covers one private Codex call for the complete admitted
      stdin envelope, not other assistants, tools, or later runtimes.

  m1-synthetic-twin:
    title: "Create a publication-safe synthetic twin"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [g0-rehearsal-integrated]
    status: done
    notes: |
      PR #18 anchors four fictional sources and eight closed tasks created
      before private episode access. The public-content disclosure review is
      safe. Before sealing, the owner copies every regular blob from that fixed
      Git tree into `PACK`, verifies the embedded and closed snapshot manifests,
      and completes the private non-derivation comparison. After sealing, fresh
      isolated Codex checks the same snapshot and owner result in the complete
      controller-built standard-input envelope. At PR #18 time, G1 would have
      remained open until Codex accepted and the owner recorded final
      acceptance. Issue #6 later stopped before that gate. This trust basis does
      not claim independent human review.
      Runtime binding and execution remain M2 work.

  m1-seal-evidence-contract:
    title: "Seal the private inputs and decision contract"
    kind: task
    parent: m1-evidence-contract-freeze
    deps:
      - m1-freeze-manifest
      - m1-freeze-tasks
      - m1-freeze-baseline
      - m1-freeze-decision
      - m1-data-handling
      - m1-synthetic-twin
      - m1-native-codex-preflight
      - m1-native-codex-review-tooling
    status: deferred
    notes: |
      Any later source, task, oracle, baseline, threshold, order, or handling
      change creates a new evidence-contract identity. Exact code, configuration,
      and rehearsal evidence are bound later in the final run card. The owner
      completes the private comparison against the byte-exact snapshot of
      public-twin commit `234bf9edc7a67cb3f1847e6d60cfe05ddbd13a01`
      before seal. Fresh isolated Codex then checks that comparison against the
      same sealed bytes; the mapping itself is never published. The owner must
      authorize this external OpenAI processing before access. Receipt
      `graphtruth.public-g1-receipt/2` records
      `trustBasis = owner-and-fresh-isolated-codex-review` and
      `freshIsolatedCodexReviewAccepted = true`; it must not imply independent
      human attestation.

  m1-run-isolated-codex-review:
    title: "Run the post-seal native Codex contract review"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-seal-evidence-contract]
    status: deferred
    notes: |
      Create fresh review, attempt-anchor, authorization, and state staging as
      strict canonical descendants of `realpath(os.tmpdir())`; do not pass the
      populated persistent common `ANCHOR`. Copy the sealed pack byte for byte
      into the read-only review input and verify it against the external lock
      anchor. The command runs and retains a local post-seal
      identity-and-config preflight with no model call, verifies the attempt
      copy's lock, builds the complete bounded strict-UTF-8 review envelope, and makes
      one private Codex call with one disposable state root. It accepts only the
      exact allowed JSONL trace, rejects any tool event, verifies the unchanged
      pack for the second time after the call, validates the decision, and
      writes the result. The public qualification and any earlier attempt
      cannot substitute for this attempt's local check, private call, or
      evidence. No baseline,
      GraphTruth lane, task reveal, scoring, or other evaluated work is
      authorized.

  m1-owner-final-acceptance:
    title: "Verify the exact review evidence and record owner acceptance"
    kind: task
    parent: m1-evidence-contract-freeze
    deps: [m1-run-isolated-codex-review]
    status: deferred
    notes: |
      The owner reruns the verifier against the persistent sealed pack, inspects
      the attempt identity-and-config preflight, exact allowed trace, validated
      Codex result, cleanup evidence, and run record, and may accept only an
      unchanged pack with a Codex `accept`. The private final owner record is
      bound to those identities. The sealed documents record requirements;
      these later attempt and owner records establish what actually occurred.
      The owner then creates the safe v2 receipt without publishing private paths, names,
      counts, hashes, tasks, oracle material, excerpts, or failure details.

  g1-evidence-contract-frozen:
    title: "Gate: private evidence contract frozen"
    kind: milestone
    milestone: true
    parent: m1-evidence-contract-freeze
    deps: [m1-owner-final-acceptance]
    status: stopped
    notes: |
      This gate did not pass. No accepted private contract, safe public receipt,
      private runtime admission, or evaluated run exists. The stopped path is
      retained as learning and must not be represented as frozen or complete.

  m1-stop-decision:
    title: "Record the private M1 stop and publication-safe learning"
    kind: task
    parent: graphtruth
    deps: [g0-rehearsal-integrated]
    status: done
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      The owner chose stop after the private preparation path and its separate
      read-only failure audit both ended without an admissible evidence-contract
      or classified verdict. Only aggregate publication-safe facts enter the
      repository. Terminal state remains preserved outside Git and is never a
      dependency of the public successor.

  g1-private-path-disposed:
    title: "Gate: private M1 path disposed without an evaluated run"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [m1-stop-decision]
    status: done
    notes: |
      Issue #6 closes at 4/5 repo-active dates with stop. G1, M2, M3, and their
      order successor did not pass. A later private dogfood attempt requires a
      wholly new issue, identity, threat review, and contract.

  m2-private-lane:
    title: "Implement the minimal private chronological lane"
    kind: phase
    parent: graphtruth
    deps: [g1-evidence-contract-frozen]
    status: deferred
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Extend only Zone 3. Keep the public synthetic validator unchanged and do
      not promote experimental private formats into spec, schemas, or RFCs.
      The entire M2 lane remains deterministic and contains no LLM or embedding
      calls. The G1 review model is not part of the evaluated runtime; any later
      model-assisted successor requires a separate gate and plan change.

  m2-private-policy:
    title: "Add a separate strict private-run policy and lifecycle"
    kind: task
    parent: m2-private-lane
    deps: [g1-evidence-contract-frozen]
    status: deferred
    notes: "Support planned, frozen, running, completed, aborted, and invalid states explicitly."

  m2-step-runner:
    title: "Add a stepwise reveal command with persistent state outside the repository"
    kind: task
    parent: m2-private-lane
    deps: [m2-private-policy]
    status: deferred
    notes: "Pause before every next reveal; do not generate a private-derived twin or delete evidence prematurely."

  m2-candidate-intake:
    title: "Accept reviewable candidates from ordinary immutable Markdown"
    kind: task
    parent: m2-private-lane
    deps: [m2-step-runner]
    status: deferred
    notes: "Use manual or deterministic evidence-aligned input and count its cost. No LLM or embeddings."

  m2-query-measurement:
    title: "Record dossier queries, exact evidence, outcomes, time, and capture tax"
    kind: task
    parent: m2-private-lane
    deps: [m2-candidate-intake]
    status: deferred
    notes: |
      Keep the identity-bound integrity head separate from an
      identity-independent content-semantic digest suitable for comparisons
      across runtime revisions and baseline arms.

  m2-private-recovery:
    title: "Exercise private crash/resume, rebuild, termination, and purge"
    kind: task
    parent: m2-private-lane
    deps: [m2-step-runner]
    status: deferred

  m2-private-tests:
    title: "Add synthetic private-lane boundary and failure fixtures"
    kind: task
    parent: m2-private-lane
    deps: [m2-query-measurement, m2-private-recovery]
    status: deferred

  m2-repeat-rehearsal:
    title: "Repeat the isolated runtime-boundary rehearsal"
    kind: task
    parent: m2-private-lane
    deps: [m2-private-tests]
    status: deferred
    notes: |
      Re-run isolation, future/oracle/credential/network denial, crash/resume,
      rebuild, termination, and purge for the exact changed runtime identity.
      Passing this task alone does not complete the full synthetic dress
      rehearsal or admit private bytes.

  m2-full-dress-rehearsal:
    title: "Complete the full synthetic dress rehearsal"
    kind: task
    parent: m2-private-lane
    deps: [m2-repeat-rehearsal]
    status: deferred
    notes: |
      Exercise the synthetic twin through the complete frozen workflow,
      including baselines, scoring, decision handling, and deliberate exhaustion
      of every admitted budget. Preserve the current frozen v0 artifacts; this
      task uses a new run identity and records its own evidence.

  m2-owner-confirmation:
    title: "Obtain owner confirmation for the new exact report"
    kind: task
    parent: m2-private-lane
    deps: [m2-full-dress-rehearsal]
    status: deferred

  m2-seal-final-run:
    title: "Bind the frozen contract to the exact admitted runtime"
    kind: task
    parent: m2-private-lane
    deps: [m2-owner-confirmation]
    status: deferred
    notes: |
      Seal the final run card with code revision, runtime identity,
      configuration, policy, budgets, and confirmed rehearsal-report hashes.
      Any later change invalidates the seal and repeats the affected gates.

  g2-runtime-admitted:
    title: "Gate: changed runtime admitted for private bytes"
    kind: milestone
    milestone: true
    parent: m2-private-lane
    deps: [m2-seal-final-run]
    status: deferred
    notes: |
      The exact changed runner passes future/oracle/credential/network
      boundaries, crash/resume, rebuild and purge, plus the full synthetic
      workflow and declared budget-exhaustion cases. Its evidence is confirmed
      by the owner, and the final run card binds it to the frozen private
      evidence contract.

  m3-chronological-pilot:
    title: "Run the first private chronological S0-S1 pilot"
    kind: phase
    parent: graphtruth
    deps: [g2-runtime-admitted]
    status: deferred
    issue: "https://github.com/asukhodko/graphtruth/issues/6"
    notes: |
      Historical private successor phase. Issue #6 stopped before this work and
      its unused nominal day is not reusable. Any revived private experiment
      requires a new issue, authority, freeze, and budget.

  m3-execute-frozen-comparison:
    title: "Execute the predeclared first-exposure baseline and frozen SUT lanes"
    kind: task
    parent: m3-chronological-pilot
    deps: [g2-runtime-admitted]
    status: deferred
    notes: "Follow the frozen role order; do not repair an active lane after viewing output."

  m3-correction-fork:
    title: "Run the separate interactive correction fork"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-execute-frozen-comparison]
    status: deferred
    notes: "Corrections append attributable records and preserve the frozen history."

  m3-score-denominator:
    title: "Score every eligible task, severe error, cost, and omission"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-execute-frozen-comparison, m3-correction-fork]
    status: deferred

  m3-learning-record:
    title: "Record expected, observed, learned, failures, and generalized fixtures"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-score-denominator]
    status: deferred
    issue: "https://github.com/asukhodko/graphtruth/issues/6"

  m3-decision:
    title: "Decide keep, shrink, or stop for the chronological hypothesis"
    kind: task
    parent: m3-chronological-pilot
    deps: [m3-learning-record]
    status: deferred
    notes: |
      Keep requires zero severe boundary/history failures and the frozen utility
      threshold. Shrink preserves the safe useful core. Stop remains a valid
      learning result when ordinary files are materially better.

  g3-chronological-decision:
    title: "Gate: private chronological decision recorded"
    kind: milestone
    milestone: true
    parent: m3-chronological-pilot
    deps: [m3-decision]
    status: deferred
    notes: |
      This gate is retained as historical design and was not reached. Issue #6
      stopped earlier. Any revived private chronological hypothesis needs a new
      issue and authority.

  m4-order-successor:
    title: "Run the bounded order-robustness successor"
    kind: phase
    parent: graphtruth
    deps: [g3-chronological-decision]
    status: deferred
    notes: |
      Starts only after chronological keep, under a new issue, time box, run
      card, owner, and identity.

  m4-freeze-successor:
    title: "Freeze all n! orders, semantic equivalence, worst-order gate, and retry rules"
    kind: task
    parent: m4-order-successor
    deps: [g3-chronological-decision]
    status: conditional

  m4-run-orders:
    title: "Execute every registered order from clean state"
    kind: task
    parent: m4-order-successor
    deps: [m4-freeze-successor]
    status: conditional

  m4-order-decision:
    title: "Record order-robustness keep, shrink, or stop"
    kind: task
    parent: m4-order-successor
    deps: [m4-run-orders]
    status: conditional

  g4-order-decision:
    title: "Gate: order-robustness decision recorded"
    kind: milestone
    milestone: true
    parent: m4-order-successor
    deps: [m4-order-decision]
    status: deferred

  g4-order-path-disposed:
    title: "Gate: order-successor path disposed"
    kind: milestone
    milestone: true
    parent: graphtruth
    deps:
      - id: g3-chronological-decision
        type: fs
        hard: true
      - id: g4-order-decision
        type: fs
        hard: false
        note: "Required only when the chronological decision is keep."
    status: deferred
    notes: |
      After keep, close this gate only through g4-order-decision. After shrink
      or stop, record order robustness as not applicable before closing it.

  m5-next-track:
    title: "Select exactly one next major evidence track"
    kind: phase
    parent: graphtruth
    deps: [g1-private-path-disposed]
    status: done
    notes: |
      The owner selected the first public reproducibility corpus after the
      private preparation path stopped. Do not open parallel major WIP.

  m5-record-choice:
    title: "Record the evidence-based next-track choice"
    kind: task
    parent: m5-next-track
    deps: [g1-private-path-disposed]
    status: done
    notes: |
      `python-annotations-semantics-v1` is selected under Issue #24 with a new
      owner, five-date budget, run identity, and sequential decision gate. It
      does not replace missing private dogfood evidence.

  g5-next-track-selected:
    title: "Gate: next major track selected"
    kind: milestone
