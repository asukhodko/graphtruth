views:
  current-work:
    title: "Current and ready work"
    where:
      status: [current, ready]
    order_by: status
  near-decision-path:
    title: "Near decision path through next-track selection"
    where:
      parent: graphtruth
      status: [current, ready, planned, conditional]
  decision-gates:
    title: "Decision gates"
    where:
      kind: [milestone]
      status: [planned, conditional]
  future-horizons:
    title: "Deferred horizons"
    where:
      status: [deferred]

x:
  exec:
    program:
      nearest_goal: "Complete Issue #6 with a decision from one real private chronological replay."
      success_by_next_sync: "Freeze the remaining private evidence contract within at most two remaining repo-active dates, or record the owner's shrink or stop decision before the fifth date starts."
    defaults:
      status_progress:
        done: 1.0
        current: 0.5
        ready: 0.0
        planned: 0.0
        conditional: 0.0
        deferred: 0.0
      weight_strategy: effort_effective
    blocks:
      integration:
        title: "Rehearsal integration"
        scope_nodes: [m0-rehearsal-integration]
        kind: main
        mgmt:
          health: green
          sync_note: "G0 closed with PR #14 evidence, PR #15 hardening, Issue #6 accounting, and the then-current personal notes aligned."
          next_sync_goal: "Keep the integrated evidence immutable while the private contract is frozen."
      pack-freeze:
        title: "Private evidence-contract freeze"
        scope_nodes: [m1-evidence-contract-freeze]
        kind: main
        mgmt:
