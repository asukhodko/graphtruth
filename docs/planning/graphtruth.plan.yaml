    kind: milestone
    milestone: true
    parent: graphtruth
    deps: [h-public-corpora]
    status: deferred
    issue: "https://github.com/asukhodko/graphtruth/issues/8"
    notes: "Eligible only after the complete three-corpus public horizon reaches keep."

  h-protocol-hardening:
    title: "Horizon: earn protocol schemas, conformance, migrations, and an independent reader"
